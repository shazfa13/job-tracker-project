services:
  - type: web
    name: job-tracker-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: jobtracker
      - key: PORT
        value: 10000
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SERVE_STATIC_FRONTEND
        value: false
